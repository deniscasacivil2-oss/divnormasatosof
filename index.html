<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Olímpia 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .sidebar { background-color: #003366; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.15); border: 1px solid #e2e8f0; }
        .nav-link { transition: all 0.2s; border-radius: 8px; }
        .nav-link.active { background-color: #ffb800; color: #003366 !important; font-weight: 600; }
        .text-navy { color: #003366; }
        .section-content { display: none; }
        .section-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .logo-container img { object-fit: contain; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sidebar-content { min-width: 256px; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- Menu Lateral -->
    <aside id="sidebar" class="sidebar text-white flex-shrink-0 flex flex-col transition-all duration-300 w-64 overflow-hidden h-screen sticky top-0 z-50">
        <div class="sidebar-content flex flex-col h-full">
            <div class="p-6 text-center border-b border-blue-900">
                <div class="bg-white p-2 rounded-lg mb-4 inline-block logo-container shadow-lg">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Bras%C3%A3o_de_Ol%C3%ADmpia%2C_SP.jpg" alt="Brasão de Olímpia" class="h-16">
                </div>
                <h2 class="text-[10px] font-bold tracking-widest uppercase text-blue-100 leading-tight px-2">ACOMPANHAMENTO DE PROJETOS DO EXECUTIVO NA CÂMARA</h2>
            </div>
            
            <nav id="menu-lateral" class="flex-grow p-4 space-y-2 mt-4 overflow-y-auto no-scrollbar">
                <div class="animate-pulse flex items-center space-x-3 p-3">
                    <div class="rounded-full bg-blue-800 h-6 w-6"></div>
                    <div class="h-4 bg-blue-800 rounded w-3/4"></div>
                </div>
            </nav>

            <div class="p-6 bg-blue-950 text-[10px] text-blue-300 mt-auto border-t border-blue-900">
                <p class="font-bold">Divisão de Governança, Processos e Projetos Estratégicos</p>
                <p>Casa Civil | Município de Olímpia - SP</p>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-w-0 w-full">
        <header class="bg-white border-b h-16 flex items-center justify-between px-8 sticky top-0 z-40 shadow-sm">
            <div class="flex items-center space-x-4">
                <button onclick="toggleSidebar()" class="text-navy hover:text-blue-600 transition-colors focus:outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <h1 id="page-title" class="text-xl font-bold text-navy uppercase tracking-tight">Carregando...</h1>
            </div>
            <div class="flex items-center space-x-3">
                <span class="bg-blue-100 text-navy px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">Ano 2026</span>
                <div class="h-8 w-8 rounded-full bg-navy text-white flex items-center justify-center font-bold text-xs shadow-md border-2 border-gray-200">OP</div>
            </div>
        </header>

        <div id="conteiner-secoes" class="p-4 md:p-8 w-full mx-auto max-w-[1600px]">
            <div class="flex flex-col items-center justify-center h-64 text-navy mt-20">
                <i class="fa-solid fa-spinner fa-spin text-5xl mb-4 text-blue-500"></i>
                <h2 class="text-xl font-bold uppercase tracking-widest">Sincronizando Dados</h2>
                <p class="text-sm text-gray-500 mt-2">Construindo painéis a partir da nuvem...</p>
            </div>
        </div>
    </main>

    <script>
        // Gestão Retrátil do Menu
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('w-64')) {
                sidebar.classList.replace('w-64', 'w-0');
            } else {
                sidebar.classList.replace('w-0', 'w-64');
            }
        }

        // Nova URL da API do Apps Script
        const url = 'https://script.google.com/macros/s/AKfycbyNTTuxwuf_i0tNdBqJ4Db27rGhwpO21YTWZn1VfADhz_HvHSRcVwwgaTEa2LyGRst2NA/exec';

        // Alternador de Abas
        window.showSection = function(sectionId, element, titulo) {
            document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
            if(element) element.classList.add('active');

            document.querySelectorAll('.section-content').forEach(section => section.classList.remove('active'));
            const sec = document.getElementById(sectionId);
            if(sec) sec.classList.add('active');

            document.getElementById('page-title').innerText = titulo;
            
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.replace('w-64', 'w-0');
            }
        }

        // Sanitização contra ataques XSS
        function sanitizeHTML(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/[&<>'"]/g, function(match) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[match];
            });
        }

        // Formata os textos com ou sem Hyperlink
        function formatarValorLink(valObj, isMainCol) {
            if (!valObj) return '-';
            
            let texto = '';
            let linkUrl = '';
            
            // Verifica se o Apps Script enviou o formato de Objeto contendo texto e link
            if (typeof valObj === 'object') {
                texto = String(valObj.text || '').trim();
                linkUrl = valObj.link ? String(valObj.link).trim() : '';
            } else {
                texto = String(valObj).trim();
            }

            if (texto === '' || texto === '-' || texto.toLowerCase() === 'n/a') return texto;
            
            let safeText = sanitizeHTML(texto);
            
            // Se houver uma URL associada, transforma num elemento <a> clicável 
            if (linkUrl && linkUrl.startsWith('http')) {
                let safeUrl = sanitizeHTML(linkUrl);
                let linkClass = isMainCol 
                    ? "text-blue-700 hover:text-blue-900 underline decoration-blue-300 decoration-2 underline-offset-2 transition-colors cursor-pointer inline-block"
                    : "text-blue-600 hover:text-blue-800 underline transition-colors cursor-pointer";
                
                // Exibe a dica da URL ao passar o mouse usando o atributo title
                return `<a href="${safeUrl}" target="_blank" title="${safeUrl}" class="${linkClass}" onclick="event.stopPropagation()">${safeText}</a>`;
            }
            
            return safeText;
        }

        // Carrega os Dados e Monta a Tela
        async function carregarDados() {
            try {
                const resposta = await fetch(url, { redirect: 'follow' });
                if (!resposta.ok) throw new Error("Erro na rede: " + resposta.status);
                
                const textoResposta = await resposta.text();
                let dados = [];
                try {
                    dados = JSON.parse(textoResposta);
                } catch (parseErro) {
                    throw new Error("O servidor não retornou JSON.");
                }
                
                if (!Array.isArray(dados)) dados = [dados];

                const chavesRaiz = ['PL', 'PLC', 'PELO'];
                const configMenus = [
                    { id: 'secao-pl', titulo: 'Projeto de Lei', sigla: 'PL', icon: 'fa-file-lines' },
                    { id: 'secao-plc', titulo: 'Projeto de Lei Complementar', sigla: 'PLC', icon: 'fa-file-signature' },
                    { id: 'secao-pelo', titulo: 'Projeto de Emenda à L.O.', sigla: 'PELO', icon: 'fa-book-bookmark' }
                ];

                const menuLateral = document.getElementById('menu-lateral');
                const conteinerSecoes = document.getElementById('conteiner-secoes');
                menuLateral.innerHTML = '';
                conteinerSecoes.innerHTML = '';

                if (dados.length === 0) {
                    conteinerSecoes.innerHTML = `<div class="p-10 text-center text-gray-500">Nenhum dado encontrado.</div>`;
                    return;
                }

                const todasColunas = Object.keys(dados[0]);

                configMenus.forEach((menu) => {
                    // Menu Esquerdo
                    menuLateral.innerHTML += `
                        <a href="#" onclick="showSection('${menu.id}', this, '${menu.titulo}')" class="nav-link flex items-center space-x-3 p-3 text-blue-100 hover:bg-blue-800">
                            <i class="fa-solid ${menu.icon} w-6 text-center"></i>
                            <span class="truncate text-[11px] font-bold tracking-wider uppercase">${menu.titulo}</span>
                        </a>
                    `;

                    // Filtra os dados da tabela
                    let dadosFiltrados = dados.filter(row => {
                        let textoPrincipal = '';
                        if (row[menu.titulo]) {
                            textoPrincipal = typeof row[menu.titulo] === 'object' ? String(row[menu.titulo].text || '') : String(row[menu.titulo] || '');
                        } else if (row[menu.sigla]) {
                            textoPrincipal = typeof row[menu.sigla] === 'object' ? String(row[menu.sigla].text || '') : String(row[menu.sigla] || '');
                        }
                        
                        textoPrincipal = textoPrincipal.trim();
                        if (textoPrincipal !== '' && textoPrincipal !== '-') {
                            return textoPrincipal.toUpperCase().startsWith(menu.sigla);
                        }
                        return false;
                    });

                    let colunasExibir = todasColunas.filter(c => {
                        let cUp = c.toUpperCase().trim();
                        let isOutraSigla = chavesRaiz.includes(cUp) && cUp !== menu.sigla;
                        let isOutroTitulo = configMenus.some(m => m.titulo.toUpperCase() === cUp && m.titulo.toUpperCase() !== menu.titulo.toUpperCase());
                        return !isOutraSigla && !isOutroTitulo;
                    });

                    // Contagens para os Cards e Gráficos
                    let tAprovado=0, tRejeitado=0, tTramite=0;
                    let tDeliberacao=0, tDiscussao1=0, tDiscussao2=0;

                    dadosFiltrados.forEach(row => {
                        let statusStr = '';
                        let tramiteStr = '';
                        
                        colunasExibir.forEach(c => {
                            let cUp = c.toUpperCase();
                            let valObj = row[c];
                            let cellText = typeof valObj === 'object' && valObj !== null ? String(valObj.text || '') : String(valObj || '');
                            cellText = cellText.toLowerCase();

                            if (cUp === 'STATUS FINAL') statusStr += ' ' + cellText;
                            if (cUp === 'TRÂMITE NA CÂMARA') tramiteStr += ' ' + cellText;
                        });

                        let allTextStatus = statusStr;
                        if (allTextStatus.includes('aprovado') || allTextStatus.includes('sancionad') || allTextStatus.includes('promulgad')) tAprovado++;
                        else if (allTextStatus.includes('rejeitado') || allTextStatus.includes('arquivado') || allTextStatus.includes('vetado')) tRejeitado++;
                        else if (allTextStatus.includes('tramitando') || allTextStatus.includes('andamento') || allTextStatus.includes('discussão') || allTextStatus.includes('deliberação')) tTramite++;

                        let allTextTramite = tramiteStr;
                        if (allTextTramite.includes('deliberação') || allTextTramite.includes('deliberacao')) tDeliberacao++;
                        if (allTextTramite.includes('1ª discussão') || allTextTramite.includes('1a discussão') || allTextTramite.includes('1º') || allTextTramite.includes('1°')) tDiscussao1++;
                        if (allTextTramite.includes('2ª discussão') || allTextTramite.includes('2a discussão') || allTextTramite.includes('2º') || allTextTramite.includes('2°')) tDiscussao2++;
                    });

                    // HTML dos Cards
                    let cardsHtml = `
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 mb-6">
                            <div class="card p-3 border-b-4 border-navy shadow-sm flex flex-col justify-center items-center text-center">
                                <p class="text-[9px] font-bold text-gray-500 uppercase tracking-wider">Total</p>
                                <h3 class="text-xl font-black text-navy mt-1">${dadosFiltrados.length}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-green-500 shadow-sm flex flex-col justify-center items-center text-center bg-green-50/30">
                                <p class="text-[9px] font-bold text-green-700 uppercase tracking-wider">Aprovados</p>
                                <h3 class="text-xl font-black text-green-700 mt-1">${tAprovado}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-red-500 shadow-sm flex flex-col justify-center items-center text-center bg-red-50/30">
                                <p class="text-[9px] font-bold text-red-700 uppercase tracking-wider">Rejeitados/Arq</p>
                                <h3 class="text-xl font-black text-red-700 mt-1">${tRejeitado}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-blue-500 shadow-sm flex flex-col justify-center items-center text-center bg-blue-50/30">
                                <p class="text-[9px] font-bold text-blue-700 uppercase tracking-wider">Em Trâmite</p>
                                <h3 class="text-xl font-black text-blue-700 mt-1">${tTramite}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-orange-400 shadow-sm flex flex-col justify-center items-center text-center bg-orange-50/30">
                                <p class="text-[9px] font-bold text-orange-700 uppercase tracking-wider">Deliberação</p>
                                <h3 class="text-xl font-black text-orange-700 mt-1">${tDeliberacao}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-purple-500 shadow-sm flex flex-col justify-center items-center text-center bg-purple-50/30">
                                <p class="text-[9px] font-bold text-purple-700 uppercase tracking-wider">1ª Discussão</p>
                                <h3 class="text-xl font-black text-purple-700 mt-1">${tDiscussao1}</h3>
                            </div>
                            <div class="card p-3 border-b-4 border-indigo-500 shadow-sm flex flex-col justify-center items-center text-center bg-indigo-50/30">
                                <p class="text-[9px] font-bold text-indigo-700 uppercase tracking-wider">2ª Discussão</p>
                                <h3 class="text-xl font-black text-indigo-700 mt-1">${tDiscussao2}</h3>
                            </div>
                        </div>
                    `;

                    // HTML da Tabela
                    let theadHtml = `<tr>`;
                    colunasExibir.forEach(c => {
                        let cUp = c.toUpperCase().trim();
                        let isMainCol = (cUp === 'PL' || cUp === 'PLC' || cUp === 'PELO');
                        let classes = isMainCol 
                            ? `p-3 text-center bg-blue-100 text-blue-900 border-r border-blue-200 min-w-[150px] sticky top-0 font-black shadow-sm` 
                            : `p-3 text-left border-r border-gray-300 min-w-[180px] sticky top-0`;
                        theadHtml += `<th class="${classes}">${c}</th>`;
                    });
                    theadHtml += `</tr>`;

                    let tbodyHtml = '';
                    if (dadosFiltrados.length === 0) {
                        tbodyHtml = `<tr><td colspan="${colunasExibir.length}" class="p-8 text-center text-gray-500 font-medium">Nenhum projeto encontrado para esta categoria.</td></tr>`;
                    } else {
                        dadosFiltrados.forEach((row, idx) => {
                            let trClass = idx % 2 === 0 ? 'bg-white' : 'bg-gray-50';
                            tbodyHtml += `<tr class="${trClass} hover:bg-blue-50 transition-colors border-b border-gray-200">`;
                            
                            colunasExibir.forEach(c => {
                                let cUp = c.toUpperCase().trim();
                                let isMainCol = (cUp === 'PL' || cUp === 'PLC' || cUp === 'PELO');
                                let valHtml = formatarValorLink(row[c], isMainCol);
                                
                                let extraClasses = isMainCol ? 'font-bold text-navy bg-blue-50/50 text-sm text-center align-middle' : 'text-left align-top';
                                let contentDisplay = valHtml;

                                if (cUp.includes('STATUS') || cUp.includes('SITUAÇÃO') || cUp.includes('TRAMITAÇÃO') || cUp.includes('TRÂMITE')) {
                                    let rawText = typeof row[c] === 'object' ? String(row[c].text || '') : String(row[c] || '');
                                    let rawLow = rawText.toLowerCase();
                                    if(rawLow.includes('aprovado') || rawLow.includes('sancionad') || rawLow.includes('promulgad')) {
                                        contentDisplay = `<span class="inline-block bg-green-100 text-green-800 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${valHtml}</span>`;
                                    } else if (rawLow.includes('rejeitado') || rawLow.includes('arquivado') || rawLow.includes('vetado')) {
                                        contentDisplay = `<span class="inline-block bg-red-100 text-red-800 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${valHtml}</span>`;
                                    } else if (rawLow.includes('tramitando') || rawLow.includes('andamento') || rawLow.includes('discussão') || rawLow.includes('deliberação')) {
                                        contentDisplay = `<span class="inline-block bg-blue-100 text-blue-800 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider">${valHtml}</span>`;
                                    }
                                }

                                tbodyHtml += `<td class="p-3 text-xs text-gray-700 whitespace-normal break-words border-r border-gray-100 ${extraClasses}">${contentDisplay}</td>`;
                            });
                            tbodyHtml += `</tr>`;
                        });
                    }

                    conteinerSecoes.innerHTML += `
                        <section id="${menu.id}" class="section-content">
                            ${cardsHtml}
                            <div class="card overflow-hidden shadow-md bg-white w-full mb-8">
                                <div class="w-full overflow-x-auto">
                                    <table class="w-full border-collapse">
                                        <thead class="uppercase text-[10px] bg-gray-200 text-black">
                                            ${theadHtml}
                                        </thead>
                                        <tbody class="text-gray-800 font-medium">
                                            ${tbodyHtml}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="card p-6 shadow-sm border-t-4 border-gray-300">
                                    <h4 class="font-black text-navy text-xs mb-4 uppercase tracking-widest text-center">Situação Geral</h4>
                                    <div class="h-64 relative w-full flex justify-center">
                                        ${(tAprovado + tRejeitado + tTramite) > 0 ? `<canvas id="chart-status-${menu.id}"></canvas>` : `<div class="flex items-center justify-center h-full text-gray-400 text-xs italic">Nenhum registro classificado</div>`}
                                    </div>
                                </div>
                                <div class="card p-6 shadow-sm border-t-4 border-blue-300">
                                    <h4 class="font-black text-navy text-xs mb-4 uppercase tracking-widest text-center">Fases de Trâmite</h4>
                                    <div class="h-64 relative w-full flex justify-center">
                                        ${(tDeliberacao + tDiscussao1 + tDiscussao2) > 0 ? `<canvas id="chart-fase-${menu.id}"></canvas>` : `<div class="flex items-center justify-center h-full text-gray-400 text-xs italic">Nenhum registro nesta fase</div>`}
                                    </div>
                                </div>
                            </div>
                        </section>
                    `;
                });

                // Renderiza os Gráficos de Pizza/Doughnut
                configMenus.forEach(menu => {
                    let canvasStatus = document.getElementById(`chart-status-${menu.id}`);
                    if (canvasStatus) {
                        let totalVal = [0, 0, 0]; 
                        let dadosFiltrados = dados.filter(row => {
                            let textoPrincipal = typeof row[menu.titulo] === 'object' ? String(row[menu.titulo]?.text || '') : String(row[menu.titulo] || row[menu.sigla] || '');
                            return textoPrincipal.toUpperCase().startsWith(menu.sigla);
                        });
                        dadosFiltrados.forEach(row => {
                            let statusStr = '';
                            Object.keys(row).forEach(c => {
                                let cUp = c.toUpperCase();
                                if(cUp === 'STATUS FINAL'){
                                    statusStr += ' ' + (typeof row[c] === 'object' ? String(row[c]?.text || '') : String(row[c] || ''));
                                }
                            });
                            statusStr = statusStr.toLowerCase();
                            if(statusStr.includes('aprovado') || statusStr.includes('sancionad')) totalVal[0]++;
                            else if(statusStr.includes('rejeitado') || statusStr.includes('arquivado')) totalVal[1]++;
                            else if(statusStr.includes('tramitando') || statusStr.includes('andamento') || statusStr.includes('discussão') || statusStr.includes('deliberação')) totalVal[2]++;
                        });
                        new Chart(canvasStatus.getContext('2d'), {
                            type: 'doughnut',
                            data: {
                                labels: ['Aprovados', 'Rejeitados/Arq', 'Em Trâmite'],
                                datasets: [{
                                    data: totalVal,
                                    backgroundColor: ['#22c55e', '#ef4444', '#3b82f6'],
                                    borderWidth: 2, borderColor: '#ffffff'
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {font:{size:10}} } } }
                        });
                    }

                    let canvasFase = document.getElementById(`chart-fase-${menu.id}`);
                    if (canvasFase) {
                        let faseVal = [0, 0, 0]; 
                        let dadosFiltrados = dados.filter(row => {
                            let textoPrincipal = typeof row[menu.titulo] === 'object' ? String(row[menu.titulo]?.text || '') : String(row[menu.titulo] || row[menu.sigla] || '');
                            return textoPrincipal.toUpperCase().startsWith(menu.sigla);
                        });
                        dadosFiltrados.forEach(row => {
                            let tramiteStr = '';
                            Object.keys(row).forEach(c => {
                                let cUp = c.toUpperCase();
                                if(cUp === 'TRÂMITE NA CÂMARA'){
                                    tramiteStr += ' ' + (typeof row[c] === 'object' ? String(row[c]?.text || '') : String(row[c] || ''));
                                }
                            });
                            tramiteStr = tramiteStr.toLowerCase();
                            if(tramiteStr.includes('deliberação') || tramiteStr.includes('deliberacao')) faseVal[0]++;
                            if(tramiteStr.includes('1ª discussão') || tramiteStr.includes('1a discussão') || tramiteStr.includes('1º') || tramiteStr.includes('1°')) faseVal[1]++;
                            if(tramiteStr.includes('2ª discussão') || tramiteStr.includes('2a discussão') || tramiteStr.includes('2º') || tramiteStr.includes('2°')) faseVal[2]++;
                        });
                        new Chart(canvasFase.getContext('2d'), {
                            type: 'pie',
                            data: {
                                labels: ['Deliberação', '1ª Discussão', '2ª Discussão'],
                                datasets: [{
                                    data: faseVal,
                                    backgroundColor: ['#fb923c', '#a855f7', '#6366f1'],
                                    borderWidth: 2, borderColor: '#ffffff'
                                }]
                            },
                            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: {font:{size:10}} } } }
                        });
                    }
                });

                // Clica no primeiro menu por padrão
                const primeiroLink = document.querySelector('.nav-link');
                if (primeiroLink) { primeiroLink.click(); }

            } catch (erro) {
                console.error("Erro interno do Painel:", erro);
                document.getElementById('conteiner-secoes').innerHTML = `
                    <div class="text-center p-10 card w-full bg-red-50 border-red-200 max-w-lg mx-auto">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
